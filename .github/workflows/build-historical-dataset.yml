name: build historical dataset

on:
  workflow_dispatch:

concurrency:
  group: build-historical-dataset
  cancel-in-progress: true

jobs:
  parlgov-leader-exit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - run: pytest -q
      - name: Build official ParlGov snapshot
        run: |
          python -m fencha build-parlgov \
            --as-of 2023-06-30 \
            --earliest-cutoff 1945-01-01
      - name: Validate real dataset floor
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("data/processed/parlgov_leader_exit_180d.manifest.json")
              .read_text(encoding="utf-8")
          )
          assert manifest["forecast_cases"] >= 500, manifest
          assert len(manifest["countries"]) >= 20, manifest
          assert 0 < manifest["positive_cases"] < manifest["forecast_cases"], manifest
          assert 0 < manifest["base_rate"] < 1, manifest
          print(json.dumps(manifest, indent=2, ensure_ascii=False))
          PY
      - name: Run chronological holdout benchmark
        run: |
          python -m fencha benchmark \
            --holdout-start 2015-01-01 \
            --minimum-training-cases 500 \
            --target-stride 3 \
            --max-history 5000
      - name: Validate benchmark output
        run: |
          python - <<'PY'
          import json
          import math
          from pathlib import Path

          report = json.loads(
              Path("data/processed/parlgov_benchmark.json")
              .read_text(encoding="utf-8")
          )
          assert report["analog"]["predictions"] >= 100, report
          for model in ("baseline", "analog"):
              for metric in ("brier_score", "log_loss", "calibration_error"):
                  assert math.isfinite(report[model][metric]), report
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: parlgov-leader-exit-180d
          path: |
            data/processed/parlgov_leader_exit_180d.jsonl
            data/processed/parlgov_leader_exit_180d.manifest.json
            data/processed/parlgov_benchmark.json
          retention-days: 30
