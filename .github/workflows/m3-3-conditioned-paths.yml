name: M3.3 exit-conditioned path benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/m3-3-conditioned-paths.yml"

permissions:
  contents: write

concurrency:
  group: m3-3-conditioned-paths
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore ParlGov source cache
        uses: actions/cache@v4
        with:
          path: data/raw/parlgov
          key: fencha-historical-sources-v2-parlgov-gdelt-2020-2023

      - name: Install and test
        run: |
          python -m pip install -e '.[dev]'
          pytest -q

      - name: Build competing-risk cases
        run: |
          python -m fencha.m3_competing_cli build \
            --as-of 2023-06-30 \
            --earliest-cutoff 1945-01-01 \
            --horizons 30,90,180,365 \
            --election-window-days 120 \
            --download-timeout 120 \
            --download-retries 3

      - name: Run exit-conditioned hybrid benchmark
        run: |
          python -m fencha.m3_3_conditioned_cli \
            --holdout-start 2015-01-01 \
            --horizons 30,90,180,365 \
            --mechanisms post_election_transition,other_recorded_transition \
            --minimum-training-cases 500 \
            --target-stride 3 \
            --max-history 3000 \
            --tenure-bucket-days 730 \
            --country-strength 400 \
            --tenure-strength 400 \
            --context-strength 400 \
            --path-top-k 50 \
            --path-prior-strength 8 \
            --path-minimum-similarity 0.05 \
            --path-numeric-scale iqr

      - name: Validate conditioned report
        run: |
          python - <<'PY'
          import json
          import math
          from pathlib import Path

          report = json.loads(
              Path("data/processed/m3_3_conditioned_competing_benchmark.json")
              .read_text(encoding="utf-8")
          )
          assert report["horizons"] == [30, 90, 180, 365], report
          assert report["mechanisms"] == [
              "other_recorded_transition",
              "post_election_transition",
          ], report
          assert report["snapshots"] == 1110, report
          assert report["exit_observations"] == 58, report
          assert report["max_adjusted_conservation_error"] < 1e-9, report
          assert len(report["snapshot_ids"]) == report["snapshots"], report
          for key in (
              "adjusted_integrated_total_brier",
              "total_brier_skill_vs_baseline",
              "adjusted_integrated_mechanism_brier",
              "mechanism_brier_skill_vs_baseline",
              "adjusted_conditional_brier",
              "conditional_brier_skill_vs_baseline",
              "adjusted_conditional_log_loss",
              "conditional_log_loss_skill_vs_baseline",
              "adjusted_conditional_accuracy",
          ):
              assert math.isfinite(report[key]), (key, report[key])
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Publish exploratory result
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(
              Path("data/processed/m3_3_conditioned_competing_benchmark.json")
              .read_text(encoding="utf-8")
          )
          rows = []
          for item in report["horizon_metrics"]:
              rows.append(
                  f"| {item['horizon_days']} | {item['snapshots']} | {item['exits']} | "
                  f"{item['baseline_total']['brier_score']:.6f} | "
                  f"{item['adjusted_total']['brier_score']:.6f} | "
                  f"{item['baseline_mean_mechanism_brier']:.6f} | "
                  f"{item['adjusted_mean_mechanism_brier']:.6f} | "
                  f"{item['adjusted_conditional']['brier_score']:.6f} | "
                  f"{item['adjusted_conditional']['log_loss']:.6f} | "
                  f"{item['adjusted_conditional']['accuracy']:.2%} |"
              )
          text = f"""# M3.3 Exit-Conditioned Path Result

          Source commit: `{os.environ['SOURCE_SHA']}`

          ## Evidence status

          Exploratory result on the existing 2015+ block. Path models are trained only on resolved observations where an exit occurred; non-exits no longer dominate the path task.

          ## Evaluation

          - Complete snapshots: {report['snapshots']}
          - Exit observations across horizons: {report['exit_observations']}
          - Total Brier, historical baseline: {report['baseline_integrated_total_brier']:.6f}
          - Total Brier, conditioned hybrid: {report['adjusted_integrated_total_brier']:.6f}
          - Total Brier skill: {report['total_brier_skill_vs_baseline']:.6f}
          - Mechanism Brier, baseline: {report['baseline_integrated_mechanism_brier']:.6f}
          - Mechanism Brier, conditioned hybrid: {report['adjusted_integrated_mechanism_brier']:.6f}
          - Mechanism Brier skill: {report['mechanism_brier_skill_vs_baseline']:.6f}

          ## Conditional path choice among exits

          - Baseline conditional Brier: {report['baseline_conditional_brier']:.6f}
          - Conditioned conditional Brier: {report['adjusted_conditional_brier']:.6f}
          - Conditional Brier skill: {report['conditional_brier_skill_vs_baseline']:.6f}
          - Baseline conditional log loss: {report['baseline_conditional_log_loss']:.6f}
          - Conditioned conditional log loss: {report['adjusted_conditional_log_loss']:.6f}
          - Conditional log-loss skill: {report['conditional_log_loss_skill_vs_baseline']:.6f}
          - Baseline top-path accuracy: {report['baseline_conditional_accuracy']:.2%}
          - Conditioned top-path accuracy: {report['adjusted_conditional_accuracy']:.2%}
          - Maximum probability-conservation error: {report['max_adjusted_conservation_error']:.12f}

          ## Horizon summary

          | Horizon | Snapshots | Exits | Baseline total Brier | Model total Brier | Baseline mechanism Brier | Model mechanism Brier | Conditional Brier | Conditional log loss | Path accuracy |
          |---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|
          {chr(10).join(rows)}

          This result must not be described as an untouched confirmatory holdout because the design followed earlier inspection of the same period.
          """
          lines = [
              line[10:] if line.startswith("          ") else line
              for line in text.splitlines()
          ]
          Path("docs/M3_3_EXIT_CONDITIONED_RESULT.md").write_text(
              "\n".join(lines).strip() + "\n",
              encoding="utf-8",
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git add docs/M3_3_EXIT_CONDITIONED_RESULT.md
          if git diff --cached --quiet; then
            echo "Conditioned result unchanged"
          else
            git commit -m "Record M3.3 conditioned-path result [skip ci]"
            git push origin HEAD:main
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m3-3-conditioned-paths
          path: |
            data/processed/parlgov_leader_competing_risks.manifest.json
            data/processed/m3_3_conditioned_competing_benchmark.json
          if-no-files-found: ignore
          retention-days: 30
